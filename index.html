<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Improved Gradient Background */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #ffffff;
            width: 340px;
            /* More rounded corners */
            border-radius: 24px;
            /* Deeper, softer shadow */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            height: 120px;
            position: relative;
        }

        .profile-image-container {
            width: 130px;
            height: 130px;
            margin: -65px auto 0;
            border-radius: 50%;
            border: 6px solid #ffffff;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            position: relative;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 25px;
        }

        .student-name {
            margin: 10px 0 5px;
            font-size: 1.6rem;
            color: #2d3436;
            font-weight: 700;
        }

        .student-stream {
            margin: 0;
            color: #6c5ce7;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .student-bio {
            margin-top: 15px;
            color: #636e72;
            line-height: 1.7;
            font-size: 0.9rem;
            font-weight: 300;
        }

        .card-footer {
            padding: 20px;
            background-color: #fdfdfd;
            border-top: 1px solid #f1f1f1;
        }

        .contact-btn {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            /* Rounded button */
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .contact-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header"></div>
        
        <div class="profile-image-container">
            <!-- Using a placeholder service. You can replace src with a real image path -->
            <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=random&size=256" alt="Profile" class="profile-image">
        </div>

        <div class="card-body">
            <h2 class="student-name">Alex Doe</h2>
            <p class="student-stream">Computer Science</p>
            <p class="student-bio">
                Aspiring software engineer passionate about AI and web development. 
                Love coding, coffee, and solving complex problems.
            </p>
        </div>

        <div class="card-footer">
            <button class="contact-btn">Contact Me</button>
        </div>
    </div>

</body>
</html>
