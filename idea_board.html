<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-indigo: #6366f1;
            --primary-hover: #4f46e5;
            --text-slate-900: #0f172a;
            --text-slate-600: #475569;
            --text-slate-400: #94a3b8;
            --danger-red: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradient background to showcase Glassmorphism */
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 50%, #a5b4fc 100%);
            color: var(--text-slate-900);
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 550px;
            /* Glassmorphism Effect */
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Decorative gradient blob behind header */
        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
            border-radius: 50%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-slate-900);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .badge {
            background: var(--primary-indigo);
            color: white;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-slate-900);
            transition: all 0.2s ease;
            box-sizing: border-box;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-indigo);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background: #fff;
        }

        ::placeholder {
            color: var(--text-slate-400);
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn {
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: var(--primary-indigo);
            color: white;
            flex: 2;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-slate-600);
            border: 1px solid #e2e8f0;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #f8fafc;
            color: var(--text-slate-900);
            border-color: #cbd5e1;
        }

        #ideaList {
            list-style: none;
            padding: 0;
            margin: 1rem 0 0 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            /* Custom scrollbar */
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        #ideaList::-webkit-scrollbar {
            width: 6px;
        }
        
        #ideaList::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .idea-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transition: transform 0.2s;
        }
        
        .idea-card:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(4px);
        }

        .idea-content {
            flex: 1;
        }

        .idea-text {
            display: block;
            font-weight: 500;
            font-size: 1.05rem;
            color: var(--text-slate-900);
            margin-bottom: 0.25rem;
            word-break: break-word;
        }

        .idea-meta {
            font-size: 0.8rem;
            color: var(--text-slate-600);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .author {
            font-weight: 600;
            color: var(--primary-indigo);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: var(--danger-red);
            color: white;
            transform: rotate(90deg);
        }

        footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-slate-600);
            margin-top: 0.5rem;
            font-weight: 500;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Group Idea Board</h1>
        <div class="badge" id="counterBadge">0 Ideas</div>
    </header>
    
    <div class="input-group">
        <select id="userName" class="form-control">
            <option value="" disabled selected>Select Author</option>
            <option value="Nimal">Nimal</option>
            <option value="Sara">Sara</option>
            <option value="Alex">Alex</option>
            <option value="Priya">Priya</option>
            <option value="John">John</option>
        </select>
        
        <input type="text" id="ideaInput" class="form-control" placeholder="What's on your mind?" maxlength="120">
        
        <div class="actions">
            <button id="addBtn" class="btn btn-primary">
                Add Idea
            </button>
            <button id="resetBtn" class="btn btn-secondary">
                Reset
            </button>
        </div>
    </div>

    <ul id="ideaList">
        <!-- Ideas will populate here -->
    </ul>

    <footer>
        Build with AI Tools
    </footer>
</div>

<script>
    // State
    let totalIdeas = 0;

    // Elements
    const nameSelect = document.getElementById('userName');
    const ideaInput = document.getElementById('ideaInput');
    const addBtn = document.getElementById('addBtn');
    const resetBtn = document.getElementById('resetBtn');
    const ideaList = document.getElementById('ideaList');
    const counterBadge = document.getElementById('counterBadge');

    // Functions
    function updateCount(change) {
        totalIdeas += change;
        counterBadge.textContent = `${totalIdeas} Idea${totalIdeas !== 1 ? 's' : ''}`;
        
        // Optional: Animate badge
        counterBadge.style.transform = 'scale(1.1)';
        setTimeout(() => counterBadge.style.transform = 'scale(1)', 200);
    }

    function getTimestamp() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function createIdeaCard(name, text) {
        const li = document.createElement('li');
        li.className = 'idea-card';
        
        const timestamp = getTimestamp();

        li.innerHTML = `
            <div class="idea-content">
                <span class="idea-text">${text}</span>
                <div class="idea-meta">
                    <span class="author">${name}</span>
                    <span>•</span>
                    <span>Added at ${timestamp}</span>
                </div>
            </div>
            <button class="btn-delete" title="Delete Idea">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        `;

        // Delete Functionality
        const deleteBtn = li.querySelector('.btn-delete');
        deleteBtn.addEventListener('click', () => {
            li.style.transform = 'translateX(20px)';
            li.style.opacity = '0';
            setTimeout(() => {
                li.remove();
                updateCount(-1);
            }, 300);
        });

        return li;
    }

    function addIdea() {
        const name = nameSelect.value;
        const idea = ideaInput.value.trim();

        if (!name) {
            nameSelect.style.borderColor = 'var(--danger-red)';
            setTimeout(() => nameSelect.style.borderColor = '', 2000);
            return;
        }
        if (!idea) {
            ideaInput.style.borderColor = 'var(--danger-red)';
            ideaInput.focus();
            setTimeout(() => ideaInput.style.borderColor = '', 2000);
            return;
        }

        const newCard = createIdeaCard(name, idea);
        ideaList.prepend(newCard);
        
        updateCount(1);
        
        // Reset Input
        ideaInput.value = '';
        ideaInput.focus();
    }

    // Event Listeners
    addBtn.addEventListener('click', addIdea);

    resetBtn.addEventListener('click', () => {
        ideaInput.value = '';
        nameSelect.selectedIndex = 0;
        ideaInput.focus();
    });

    ideaInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            addIdea();
        }
    });
</script>

</body>
</html>
