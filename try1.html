<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Upekha Janani | Professional Profile</title>
    <style>
        /* 4. Fonts & Gradient Background */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Inter', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        /* 3. Section Styling for all boxes */
        .container-box {
            background: white;
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
            padding: 30px;
            /* 4. Rounded Corners & Shadow */
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* Profile Image */
        .profile-img {
            width: 120px;
            height: 120px;
            background: #f0f0f0;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid #2a5298;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            margin: 10px 0;
            color: #1e3c72;
        }

        .stream {
            color: #666;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Skills Tags */
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .skill-item {
            background: #eef2ff;
            color: #2a5298;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Contact Links */
        .contact-link {
            display: block;
            margin: 10px 0;
            color: #2a5298;
            text-decoration: none;
            font-weight: 500;
        }

        .contact-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container-box">
        <div class="profile-img">PHOTO</div>
        <h2>Upekha Janani</h2>
        <div class="stream">Information Technology Undergraduate</div>
        <p>A passionate student focused on building modern web applications and learning new technologies.</p>
    </div>

    <div class="container-box">
        <h3 style="color: #1e3c72;">My Skills</h3>
        <div class="skill-list">
            <span class="skill-item">Java Development</span>
            <span class="skill-item">SQL Databases</span>
            <span class="skill-item">Git & GitHub</span>
            <span class="skill-item">HTML/CSS</span>
            <span class="skill-item">Python</span>
        </div>
    </div>

    <div class="container-box">
        <h3 style="color: #1e3c72;">Contact Information</h3>
        <a href="mailto:upekhajanani0511@gmail.com" class="contact-link">📧 upekhajanani0511@gmail.com</a>
        <a href="https://github.com/upekhajanani0511-gif" class="contact-link">🌐 GitHub Profile</a>
    </div>

</body>

</html>
